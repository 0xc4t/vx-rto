
general {
    no_fade_in = false
    grace = 0
    disable_loading = false
    # Paksa DPMS nyala supaya layar tidak hitam setelah resume
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    # Tambahkan fallback color (Catppuccin Mocha Base)
    # Jika screenshot gagal, layar tidak akan hitam pekat
    color = rgb(30, 30, 46) 
    blur_passes = 3
    blur_size = 6
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 6
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    size = 100, 50
    outline_thickness = 0
    font_family = Iosevka Nerd Font
    dots_size = 0.3
    dots_space = 0.5
    dots_center = true
    inner_color = rgb(cdd6f4)
    font_color = rgb(1e1e2e)
    hide_input = false
    rounding = 25
    check_color = rgb(203, 166, 247)
    fail_color = rgb(255, 97, 97)
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$TIME"
    color = rgb(cdd6f4)
    font_size = 100
    font_family = Iosevka Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

auth {
    fingerprint:enabled = true

    fingerprint:ready_message = (Scan fingerprint to unlock)

    fingerprint:present_message = Scanning fingerprint

    fingerprint:retry_delay = 250
}
